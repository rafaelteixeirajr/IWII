<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/estilo.css">
    <title>Tom&Jarry</title>

</head>
<body>
    <div class="container">
        <div class="main-cartoon">
            <div class="elemento-cartoon">
                <h1>Cadastro de Usuario</h1>
                <img src="img/Tom.png" alt="Tom$Jarry" class="tom-cartoon">
            </div>
            <div class="forms-cartoon">
                <input type="text" id="nome" placeholder="Insirs seu nome" class="box-cartoon">
                <input type="text" id="login" placeholder="Crie seu login" class="box-cartoon">
                <input type="text" id="senhha" placeholder="Crie sua senha" class="box-cartoon">
                <input type="text" id="email" placeholder="Insira seu email" class="box-cartoon">

                <div class="btn-cartoon">
                    <button type="button" class="botao-cartoon">Cadastrar</button>
                    <button type="button" class="butao-cartoon">Sair</button>

                </div>
            </div>
        </div>
    </div>
</body>
</html>
